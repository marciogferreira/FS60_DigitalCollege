<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário HTML</title>
    <style>
        body {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <form action="https://google.com.br" method="POST" enctype="multipart/form-data">
        <br>
        <label for="nome">Nome</label>
        <input 
            type="text" 
            name="nome" 
            id="nome"
            placeholder="Exemplo: José" 
            required>
        <br>
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="jose@gmail.com" >
        <br>

        <label for="">Arquivo Currículo</label>
        <input type="file" name="curriculo">
        
        <hr>
        <label for="">Estado Civil</label> 
        <br>

        <input type="radio" name="estado_civil" value="solteiro">
        <label for="">Solteiro(a)</label>
        <br>
        <input type="radio" name="estado_civil" value="casado">
        <label for="">Casado(a)</label>

        <br>

        <!-- CheckBox -->
        <p>Qualificações: </p>

        <input type="checkbox" id="html5" name="html5">
        <label for="html5">HTML5</label>
        <br>
        
        <label for="css3">
            <input type="checkbox" id="css3" name="css3">
            CSS3
        </label>

        <hr>

        <label for="">Selecione o Curso Desejado</label>
        <br>
        <select name="curso" id="curso">
            <option value="">Selecione</option>
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="fullstack">FullStack</option>
            <option value="dba">DBA</option>
        </select>
        <hr>

        <label for="">Mensagem</label>
        <br>
        <textarea rows="10" cols="30" name="mensagem" id="mensagem" placeholder="Mensagem"></textarea> 

        <br>
        <button type="button">Consultar CEP</button>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">

    </form>

    <button>Falar com Atendente!</button>
</body>
</html>
