    <title>Layout com HTML</title>
    <style>

            margin: 0;
            padding: 0;
        }
        header {
            background-color: #3071b1;

            background-color: red;
            width: 30%;

        }

            width: 70%;
            height: 50px;
        }
        main {
            background-color: #e7e7e7;
            min-height: 500px;
            width: 100%;
        }
        footer {
            background-color: #000000;
            min-height: 200px;
            width: 100%;
        }
    </style>
</head>

        </div>
        <div id="menu">
            <nav>
                <a href="">Home</a>

    </header>
    <main>

</html>
